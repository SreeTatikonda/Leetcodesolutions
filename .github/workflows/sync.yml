name: Sync LeetCode

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync
        uses: joshcai/leetcode-sync@v1.4
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
